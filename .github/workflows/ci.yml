name: CI

# Pre-merge checks run on PRs. Pushes to main are handled by release.yml (which re-runs the
# same check suite before publishing), so this no longer triggers on push to avoid duplicate runs.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Static Checks
    strategy:
      fail-fast: false
      matrix:
          os: [ ubuntu-latest, macos-26 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        # Compose Multiplatform 1.11.x links against the iOS 26 SDK
        # (e.g. UIViewLayoutRegion / UIUtilities), so the iOS targets require
        # Xcode 26 to link. Without this the build fails with
        # "Undefined symbols ... _OBJC_CLASS_$_UIViewLayoutRegion".
      -   name: Select Xcode 26
          if: runner.os == 'macOS'
          uses: maxim-lobanov/setup-xcode@v1
          with:
              xcode-version: latest-stable
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build --stacktrace
      - name: Detekt
        run: ./gradlew detekt --stacktrace
      - name: ktlint
        run: ./gradlew ktlintCheck --stacktrace
      - name: Dokka HTML
        run: ./gradlew :pollingengine:dokkaGenerate --stacktrace
      - name: API check (if baseline present)
        run: if [ -d api ]; then ./gradlew :pollingengine:apiCheck --stacktrace; else echo "Skipping apiCheck (no baseline)"; fi
