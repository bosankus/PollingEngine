name: Publish SDK

# Manual fallback publisher for Maven Central. The automated release (build + publish + GitHub
# Release + docs) runs from release.yml on `v*` tags; trigger this only to (re)publish the current
# version on demand. Auto-publishing on every push to main is intentionally avoided — Maven Central
# rejects re-publishing an already-released version.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-maven-central
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native (konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # Publishes all KMP publications (Android + iOS + multiplatform metadata) to the
      # Maven Central Portal in one step. publishToMavenCentral uploads to a staging
      # deployment for manual release in the Portal; switch to publishAndReleaseToMavenCentral
      # to auto-release. Credentials and the signing key are injected from repository secrets
      # as Gradle project properties (ORG_GRADLE_PROJECT_*) — they are NOT stored in the repo.
      - name: Publish to Maven Central
        run: ./gradlew :pollingengine:publishToMavenCentral --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVENCENTRALUSERNAME }}
          SIGNING_ENABLED: 'true'
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
