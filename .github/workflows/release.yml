name: Release

# Auto-release pipeline, now split out for per-workflow visibility on the Actions page.
#
# The check workflows (Build, CodeQL) run independently on push to main. This workflow is NOT
# triggered by the push itself — it is triggered via `workflow_run` once a check workflow finishes.
# The gate job then confirms that BOTH Build and CodeQL completed successfully for that exact commit
# before anything is published, so publishing stays gated even though the checks live in separate
# workflows.
#
# The release job bumps the patch version, builds artifacts, publishes + releases to Maven Central,
# commits the version bump, tags v<version>, creates a GitHub Release, and deploys docs. Publishing
# happens before the commit/tag so a failed publish never advances the version. The bump commit is
# pushed with GITHUB_TOKEN (which does NOT re-trigger workflows) and carries [skip ci] as an extra
# guard, so the release never loops back into Build/CodeQL.
on:
  workflow_run:
    workflows: [ "Build", "CodeQL" ]
    types: [ completed ]

permissions:
  contents: read

# Serialize releases on main. cancel-in-progress: false means a second trigger (e.g. the second of
# the two check workflows finishing) queues behind the first and runs only after it completes — by
# which point the first run has already pushed the version tag, so the gate's idempotency check
# skips the duplicate.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only proceed if BOTH check workflows are green for this commit, and
  # the next version has not already been released.
  # ---------------------------------------------------------------------------
  gate:
    name: Gate (require Build + CodeQL)
    # Only consider push-to-main check runs that themselves succeeded. A failed/cancelled upstream
    # run, or any PR/fork run, never reaches the release job.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      current: ${{ steps.ver.outputs.current }}
      next: ${{ steps.ver.outputs.next }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Require every check workflow green for this commit
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['Build', 'CodeQL'];
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, head_sha: sha, per_page: 100 }
            );
            const allGreen = required.every((name) => {
              const latest = runs
                .filter((r) => r.name === name)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
              core.info(`${name}: ${latest ? latest.status + '/' + latest.conclusion : 'no run found'}`);
              return latest && latest.status === 'completed' && latest.conclusion === 'success';
            });
            core.setOutput('green', allGreen ? 'true' : 'false');
      - name: Compute next version and check it is not already released
        id: ver
        run: |
          FILE=gradle/libs.versions.toml
          CURRENT=$(grep -E '^pollingengine = "' "$FILE" | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          if [ -z "$CURRENT" ]; then echo "::error::could not parse pollingengine version from $FILE"; exit 1; fi
          IFS='.' read -r MA MI PA <<< "$CURRENT"
          NEXT="$MA.$MI.$((PA + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "v$NEXT" >/dev/null 2>&1; then
            echo "Tag v$NEXT already exists — already released; will skip."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Decide
        id: decide
        run: |
          if [ "${{ steps.checks.outputs.green }}" = "true" ] && [ "${{ steps.ver.outputs.already }}" = "false" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Both check workflows green and v${{ steps.ver.outputs.next }} unreleased — proceeding."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Not proceeding (checks green=${{ steps.checks.outputs.green }}, already released=${{ steps.ver.outputs.already }})."
          fi

  # ---------------------------------------------------------------------------
  # Publish: runs only after the gate approves.
  # ---------------------------------------------------------------------------
  release:
    name: Publish to Maven Central
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.gate.outputs.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native (konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Verify publish credentials present
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVENCENTRALUSERNAME }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -z "$MAVEN_CENTRAL_USERNAME" ] || [ -z "$SIGNING_KEY" ]; then
            echo "::error::Maven Central credentials/signing key missing; cannot publish."
            exit 1
          fi
      - name: Bump patch version
        id: ver
        run: |
          FILE=gradle/libs.versions.toml
          CURRENT="${{ needs.gate.outputs.current }}"
          NEXT="${{ needs.gate.outputs.next }}"
          sed -i '' -E "s/^pollingengine = \"$CURRENT\"/pollingengine = \"$NEXT\"/" "$FILE"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumped pollingengine $CURRENT -> $NEXT"
      - name: Build XCFramework and docs
        run: ./gradlew :pollingengine:podPublishReleaseXCFramework :pollingengine:dokkaGenerate --stacktrace
      - name: Publish and release to Maven Central
        run: ./gradlew :pollingengine:publishAndReleaseToMavenCentral --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVENCENTRALPASSWORD }}
          SIGNING_ENABLED: 'true'
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/libs.versions.toml
          git commit -m "chore(release): v${{ steps.ver.outputs.next }} [skip ci]"
          git tag "v${{ steps.ver.outputs.next }}"
          git push origin HEAD:main
          git push origin "v${{ steps.ver.outputs.next }}"
      - name: Zip XCFramework
        run: |
          cd pollingengine/build/cocoapods/publish/release
          zip -r PollingEngine.xcframework.zip PollingEngine.xcframework
      - name: Zip Dokka HTML
        run: |
          cd pollingengine/build/dokka/html
          zip -r ../dokka-html.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.next }}
          files: |
            pollingengine/build/cocoapods/publish/release/PollingEngine.xcframework.zip
            pollingengine/build/dokka/dokka-html.zip
      - name: Publish docs to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pollingengine/build/dokka/html
          publish_branch: gh-pages
          force_orphan: true
