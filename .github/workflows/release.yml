name: Release

# Single auto-release pipeline. On every push to main (i.e. every merge) THIS is the only
# workflow that runs — every independent check (build/static analysis, CodeQL for Kotlin and
# Swift) is a job here and they all converge into the publish job, so the Actions graph shows
# the whole flow step-by-step up to the Maven Central release.
#
# The publish job runs only after every check job passes (needs: [...]). Versioning is TAG-DRIVEN:
# the last released version is read from the latest `v*` git tag, the patch is bumped, and that
# version is injected into the build via -PreleaseVersion. The job builds artifacts, publishes +
# releases to Maven Central, then records the release by pushing a `v<version>` tag ONLY — it does
# NOT commit to main (main requires PRs via repository ruleset). Pushing a tag does not re-trigger
# this workflow (it triggers on push to main, not tags), so there is no loop.
on:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Check 1: Build + static analysis (Linux + macOS)
  # ---------------------------------------------------------------------------
  checks:
    name: Build and Static Checks
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, macos-26 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build --stacktrace
      - name: Detekt
        run: ./gradlew detekt --stacktrace
      - name: ktlint
        run: ./gradlew ktlintCheck --stacktrace
      - name: Dokka HTML
        run: ./gradlew :pollingengine:dokkaGenerate --stacktrace
      - name: API check (if baseline present)
        run: if [ -d api ]; then ./gradlew :pollingengine:apiCheck --stacktrace; else echo "Skipping apiCheck (no baseline)"; fi

  # ---------------------------------------------------------------------------
  # Check 2: CodeQL (Java/Kotlin)
  # ---------------------------------------------------------------------------
  codeql-kotlin:
    name: CodeQL (Java/Kotlin)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    # CodeQL's Kotlin extractor only supports Kotlin < 2.3.30 and hard-fails on newer
    # compilers (KotlinVersionTooRecentError). This project is on 2.4.0, so bypass the
    # version gate; the extractor still runs (analysis may be incomplete for language
    # features added after the supported version). Remove once CodeQL supports 2.4.x.
    env:
      CODEQL_EXTRACTOR_KOTLIN_OVERRIDE_MAXIMUM_VERSION_CHECK: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - uses: github/codeql-action/init@v3
        with:
          languages: 'java-kotlin'
      - name: Build Kotlin (Android target, JVM bytecode)
        run: >-
          ./gradlew :pollingengine:compileAndroidMain
          --no-daemon --no-build-cache --rerun-tasks
          -Pkotlin.compiler.execution.strategy=in-process
          --stacktrace
      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # Check 3: CodeQL (Swift)
  # ---------------------------------------------------------------------------
  codeql-swift:
    name: CodeQL (Swift)
    # Compose Multiplatform 1.11.x links against the iOS 26 SDK
    # (UIViewLayoutRegion / UIUtilities), so building the iosApp Xcode project
    # requires Xcode 26. On older images (e.g. macos-15 / Xcode 16.x) the link
    # step fails with "Undefined symbols ... _OBJC_CLASS_$_UIViewLayoutRegion".
    runs-on: macos-26
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: github/codeql-action/init@v3
        with:
          languages: 'swift'
      - name: Build iOS app for simulator (no code signing)
        run: xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -configuration Release CODE_SIGNING_ALLOWED=NO build
      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # Publish: runs only after every check above passes
  # ---------------------------------------------------------------------------
  release:
    name: Publish to Maven Central
    needs: [ checks, codeql-kotlin, codeql-swift ]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Cache Kotlin/Native (konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Verify publish credentials present
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVENCENTRALUSERNAME }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -z "$MAVEN_CENTRAL_USERNAME" ] || [ -z "$SIGNING_KEY" ]; then
            echo "::error::Maven Central credentials/signing key missing; cannot publish."
            exit 1
          fi
      - name: Determine next version from latest release tag
        id: ver
        run: |
          # Source of truth for "last released version" is the latest v* git tag (created by this
          # job on each release). Bump its patch to get the version we are about to publish. If no
          # release tag exists yet, seed from gradle/libs.versions.toml.
          git fetch --tags --force --quiet
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -n "$LATEST" ]; then
            CURRENT="${LATEST#v}"
            echo "Last released tag: $LATEST (version $CURRENT)"
          else
            CURRENT=$(grep -E '^pollingengine = "' gradle/libs.versions.toml | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
            echo "No release tags found; seeding from gradle/libs.versions.toml: $CURRENT"
          fi
          if [ -z "$CURRENT" ]; then echo "::error::could not determine current version"; exit 1; fi
          IFS='.' read -r MA MI PA <<< "$CURRENT"
          NEXT="$MA.$MI.$((PA + 1))"
          # Idempotency guard: never republish a version that already has a tag (Maven Central
          # rejects re-releasing a version, so this would only fail later anyway).
          if git rev-parse -q --verify "refs/tags/v$NEXT" >/dev/null; then
            echo "::error::tag v$NEXT already exists — $NEXT was already released; aborting."
            exit 1
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing $CURRENT -> $NEXT"
      - name: Build XCFramework and docs
        run: ./gradlew :pollingengine:podPublishReleaseXCFramework :pollingengine:dokkaGenerate -PreleaseVersion=${{ steps.ver.outputs.next }} --stacktrace
      - name: Publish and release to Maven Central
        run: ./gradlew :pollingengine:publishAndReleaseToMavenCentral -PreleaseVersion=${{ steps.ver.outputs.next }} --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVENCENTRALPASSWORD }}
          SIGNING_ENABLED: 'true'
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      # Publishing happened above, so record the release by pushing the tag ONLY. No commit to main
      # (main requires PRs via repository ruleset), and the tag is what the next run reads to compute
      # the following version. Tag refs are not covered by the branch ruleset, so this push succeeds.
      - name: Tag the release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.next }}"
          git push origin "v${{ steps.ver.outputs.next }}"
      - name: Zip XCFramework
        run: |
          cd pollingengine/build/cocoapods/publish/release
          zip -r PollingEngine.xcframework.zip PollingEngine.xcframework
      - name: Zip Dokka HTML
        run: |
          cd pollingengine/build/dokka/html
          zip -r ../dokka-html.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.next }}
          files: |
            pollingengine/build/cocoapods/publish/release/PollingEngine.xcframework.zip
            pollingengine/build/dokka/dokka-html.zip
      - name: Publish docs to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pollingengine/build/dokka/html
          publish_branch: gh-pages
          force_orphan: true
